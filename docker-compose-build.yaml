version: '3.8'
services:
  database:
    container_name: ichat_bot_main_db
    image: postgres:alpine
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # ports:
    #   - 5432:5432
    volumes:
      - database:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    image: redis:7.2.1-alpine
    restart: always
    container_name: ichat_bot_redis
    # ports:
    #   - "6379:6379"
    volumes:
      - redis:/data
    networks:
      - backend

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    # ports:
    #   - "4040:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTH_TOKEN}
    command: http --host-header=rewrite --domain=pug-simple-tadpole.ngrok-free.app app:3000
    depends_on:
      - app
    networks:
      - backend

  app:
    build: .
    container_name: ichat_bot_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=prod
    ports:
      - '3000:3000'
    depends_on:
      - database
      - redis
    networks:
      - backend

  # pgadmin: # FOR FUTURE
  #   image: dpage/pgadmin4:latest
  #   container_name: ichat_bot_pgadmin
  #   restart: unless-stopped
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
  #     PGADMIN_LISTEN_PORT: 80
  #   ports:
  #     - '5050:80'
  #   volumes:
  #     - pgadmin:/var/lib/pgadmin
  #   depends_on:
  #     - database
  #   networks:
  #     - backend

volumes:
  database:
  redis:
  # pgadmin:

networks:
  backend:
    driver: bridge