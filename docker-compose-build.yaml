version: '3.8'
services:
  database:
    container_name: ichat_bot_main_db
    image: postgres:alpine
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # ports:
    #   - 5432:5432
    volumes:
      - database:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    image: redis:7.2.1-alpine
    restart: always
    container_name: ichat_bot_redis
    # ports:
    #   - "6379:6379"
    volumes:
      - redis:/data
    networks:
      - backend

  app:
    build: .
    container_name: ichat_bot_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=prod
    # Port 3000 is intentionally NOT exposed to the host.
    # All public traffic enters through the nginx container.
    # Uncomment temporarily if you need direct access for debugging:
    # ports:
    #   - '3000:3000'
    depends_on:
      - database
      - redis
    networks:
      - backend

  nginx:
    image: nginx:alpine
    container_name: ichat_bot_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      # Config from the repo (read-only)
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Host paths written by the server-installed certbot (read-only inside container)
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - backend

  # ngrok — disabled now that the real domain is active.
  # Re-enable for local tunnel testing if needed.
  # ngrok:
  #   image: ngrok/ngrok:latest
  #   restart: unless-stopped
  #   environment:
  #     - NGROK_AUTHTOKEN=${NGROK_AUTH_TOKEN}
  #   command: http --host-header=rewrite --domain=pug-simple-tadpole.ngrok-free.app app:3000
  #   depends_on:
  #     - app
  #   networks:
  #     - backend

  # pgadmin: # FOR FUTURE
  #   image: dpage/pgadmin4:latest
  #   container_name: ichat_bot_pgadmin
  #   restart: unless-stopped
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
  #     PGADMIN_LISTEN_PORT: 80
  #   ports:
  #     - '5050:80'
  #   volumes:
  #     - pgadmin:/var/lib/pgadmin
  #   depends_on:
  #     - database
  #   networks:
  #     - backend

volumes:
  database:
  redis:
  # pgadmin:

networks:
  backend:
    driver: bridge