# STEP 2 — Full HTTPS config with HTTP→HTTPS redirect.
# This file has a .ssl.conf extension so nginx IGNORES it on startup
# (only *.conf files are loaded).
#
# Activate after certs exist:
#   1. docker compose run --rm certbot  (see DOMAIN_SETUP_INSTRUCTION.md)
#   2. mv nginx/conf.d/instabotapp.com.conf nginx/conf.d/instabotapp.com.http.bak
#      mv nginx/conf.d/instabotapp.com.ssl.conf nginx/conf.d/instabotapp.com.conf
#   3. docker compose exec nginx nginx -s reload

# Redirect all HTTP traffic to HTTPS (except ACME challenge)
server {
    listen 80;
    server_name instabotapp.com www.instabotapp.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — all real traffic
server {
    listen 443 ssl;
    server_name instabotapp.com www.instabotapp.com;

    ssl_certificate     /etc/letsencrypt/live/instabotapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/instabotapp.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 5M;

    # Serve /files/ with browser caching.
    # Security headers are repeated here because any add_header in a location block
    # replaces (not merges) the add_header directives from the parent http{} block.
    location /files/ {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        add_header Cache-Control             "public, max-age=86400";
        add_header X-Frame-Options           "SAMEORIGIN"      always;
        add_header X-Content-Type-Options    "nosniff"         always;
        add_header X-XSS-Protection          "1; mode=block"   always;
        expires 24h;
    }

    # All other traffic → NestJS
    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
