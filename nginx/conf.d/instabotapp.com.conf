# STEP 1 — HTTP-only config.
# Active immediately on first `docker compose up`.
# Serves the Certbot ACME challenge so Let's Encrypt can verify the domain.
# Once certs are obtained, REPLACE this file with instabotapp.com.ssl.conf
# (rename that file to instabotapp.com.conf, then reload nginx).
#
# Note: proxy_pass uses the Docker service name "app", not 127.0.0.1,
# because nginx and the NestJS app are on the same Docker bridge network.

server {
    listen 80;
    server_name instabotapp.com www.instabotapp.com;

    client_max_body_size 5M;

    # Certbot webroot challenge — certbot writes here, nginx serves it
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Serve /files/ with browser caching.
    # Security headers are repeated here because any add_header in a location block
    # replaces (not merges) the add_header directives from the parent http{} block.
    location /files/ {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        add_header Cache-Control             "public, max-age=86400";
        add_header X-Frame-Options           "SAMEORIGIN"      always;
        add_header X-Content-Type-Options    "nosniff"         always;
        add_header X-XSS-Protection          "1; mode=block"   always;
        expires 24h;
    }

    # All other traffic → NestJS
    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
