user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;        # most efficient I/O model on Linux
    multi_accept on;  # accept all pending connections per event loop tick
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # Performance
    sendfile           on;
    tcp_nopush         on;   # batch headers + file data into one TCP packet (works with sendfile)
    tcp_nodelay        on;   # disable Nagle on keepalive connections — reduces latency
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Gzip compression
    # client_max_body_size is intentionally NOT set here —
    # it is set per-site in conf.d/ (currently 5M) to stay close to
    # the app's 2MB avatar limit without being overly permissive.
    gzip              on;
    gzip_vary         on;        # Vary: Accept-Encoding for CDN/proxy cache separation
    gzip_proxied      any;       # compress for all proxied responses (all our traffic is proxied)
    gzip_comp_level   6;         # sweet spot: good ratio, low CPU cost
    gzip_types        text/plain text/css text/xml text/javascript
                      application/json application/javascript application/xml+rss
                      application/rss+xml font/truetype font/opentype
                      application/vnd.ms-fontobject image/svg+xml;

    # Proxy cache for /files/ — images are cached on-disk inside the nginx
    # container after the first fetch. Subsequent requests (e.g. Meta's
    # template card renderer) are served in <5ms from cache instead of
    # waiting for the full nginx → NestJS → S3 round-trip (~300-800ms).
    # The cache is stored inside the container; it resets on container restart,
    # but the first request after restart re-warms it automatically.
    proxy_cache_path /var/cache/nginx/files
                     levels=1:2
                     keys_zone=files_cache:10m
                     max_size=512m
                     inactive=24h
                     use_temp_path=off;

    # Security headers (applied globally to every response)
    add_header X-Frame-Options       "SAMEORIGIN" always;  # prevents clickjacking
    add_header X-Content-Type-Options "nosniff"   always;  # stops MIME-type sniffing
    add_header X-XSS-Protection      "1; mode=block" always;

    # Site configs live in conf.d/
    # Files ending in .conf are loaded automatically.
    # Files with any other extension (e.g. .ssl.conf) are ignored until renamed.
    # See DOMAIN_SETUP_INSTRUCTION.md for the activation steps.
    include /etc/nginx/conf.d/*.conf;
}
